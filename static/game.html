<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hical测试 - 极客快跑</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #2c3e50;
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 按照规范预留安全区 */
        .safe-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            pointer-events: none;
            z-index: 10;
        }

        .safe-capsule {
            position: absolute;
            top: 0;
            right: 0;
            width: 160px;
            height: 100px;
            pointer-events: none;
            z-index: 10;
        }

        .safe-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            pointer-events: none;
            z-index: 10;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 80px;
            left: 30px;
            font-size: 28px;
            font-weight: bold;
            color: #ecf0f1;
            z-index: 5;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            z-index: 20;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #startBtn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
    </style>
</head>

<body>
    <div class="safe-top"></div>
    <div class="safe-capsule"></div>
    <div class="safe-bottom"></div>

    <div id="ui">击溃Bug数: <span id="score">0</span></div>
    <button id="startBtn">开始服务器巡检</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        // 引用指定的 CDN 音效
        const sndJump = new Audio('https://img.ssl.q1.com/gpt/sound/jump.wav');
        const sndOver = new Audio('https://img.ssl.q1.com/gpt/sound/gameover.wav');
        const sndLevelUp = new Audio('https://img.ssl.q1.com/gpt/sound/random/levelup.wav');

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const scoreEl = document.getElementById('score');

        let width, height;
        let player = { x: 80, y: 0, width: 40, height: 40, vy: 0, gravity: 0.6, jumpPower: -12, isGrounded: false };
        let obstacles = [];
        let score = 0;
        let isPlaying = false;
        let frameCount = 0;
        let gameSpeed = 5;

        // 响应屏幕尺寸变化
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            if (!isPlaying) player.y = height - 60 - player.height;
        }
        window.addEventListener('resize', resize);
        resize();

        // 玩家跳跃逻辑
        function jump(e) {
            if (!isPlaying) return;
            // 防止触发按钮点击等默认事件
            if (e && e.target === startBtn) return;

            if (player.isGrounded) {
                player.vy = player.jumpPower;
                player.isGrounded = false;
                sndJump.currentTime = 0;
                sndJump.play().catch(() => { });
            }
        }

        // 绑定移动端触控和 PC 端鼠标点击
        window.addEventListener('touchstart', jump, { passive: false });
        window.addEventListener('mousedown', jump);

        // 生成障碍物（代表服务器Bug）
        function spawnObstacle() {
            let obsHeight = 30 + Math.random() * 50;
            obstacles.push({
                x: width,
                y: height - 60 - obsHeight,
                width: 30,
                height: obsHeight,
                passed: false
            });
        }

        function update() {
            if (!isPlaying) return;
            frameCount++;

            // 玩家重力物理
            player.vy += player.gravity;
            player.y += player.vy;

            // 地板碰撞检测（扣除底部60px安全区）
            let floorY = height - 60 - player.height;
            if (player.y >= floorY) {
                player.y = floorY;
                player.vy = 0;
                player.isGrounded = true;
            }

            // 控制障碍物生成频率
            let spawnRate = Math.max(50, 100 - Math.floor(score * 2));
            if (frameCount % spawnRate === 0) spawnObstacle();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                // 碰撞检测
                if (player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.height + player.y > obs.y) {
                    gameOver();
                }

                // 计分逻辑
                if (!obs.passed && obs.x + obs.width < player.x) {
                    obs.passed = true;
                    score++;
                    scoreEl.innerText = score;
                    // 每 5 分提速并播放升级音效
                    if (score % 5 === 0) {
                        gameSpeed += 0.5;
                        sndLevelUp.currentTime = 0;
                        sndLevelUp.play().catch(() => { });
                    }
                }

                // 移除屏幕外的障碍物
                if (obs.x + obs.width < 0) obstacles.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // 绘制赛道/地板
            ctx.fillStyle = '#34495e';
            ctx.fillRect(0, height - 60, width, 60);
            ctx.fillStyle = '#1abc9c';
            ctx.fillRect(0, height - 60, width, 5);

            // 绘制玩家 (蓝绿色方块)
            ctx.fillStyle = '#3498db';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#3498db';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.shadowBlur = 0; // 重置阴影

            // 绘制障碍物 (红色危险方块)
            ctx.fillStyle = '#e74c3c';
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });
        }

        function loop() {
            update();
            draw();
            if (isPlaying) requestAnimationFrame(loop);
        }

        function startGame(e) {
            if (e) e.stopPropagation();
            isPlaying = true;
            score = 0;
            gameSpeed = 5;
            scoreEl.innerText = score;
            obstacles = [];
            frameCount = 0;
            player.y = height - 60 - player.height;
            player.vy = 0;
            startBtn.style.display = 'none';
            loop();
        }

        function gameOver() {
            isPlaying = false;
            sndOver.currentTime = 0;
            sndOver.play().catch(() => { });
            startBtn.innerText = '节点崩溃, 重启试试';
            startBtn.style.display = 'block';
        }

        startBtn.addEventListener('click', startGame);
    </script>
</body>

</html>
