        <style>
            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                margin-bottom: 1em;
                background: #0a0a0f;
                font-family: "Courier New", monospace;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-page {
                width: 380px;
                padding: 0;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: #1a1a2e;
                max-width: 380px;
                margin: 0 auto;
                padding: 40px;
                text-align: center;
                border: 1px solid #00f5ff;
                box-shadow: 0 0 20px rgba(0, 245, 255, 0.3), inset 0 0 20px rgba(0, 245, 255, 0.05);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: #0a0a1a;
                border: 1px solid #00f5ff44;
                box-sizing: border-box;
                font-size: 16px;
                outline: 0;
                padding: 12px 40px 12px 15px;
                width: 100%;
                color: #00f5ff;
                font-family: "Courier New", monospace;
                letter-spacing: 2px;
            }

            .staticrypt-form input[type="password"]:focus,
            .staticrypt-form input[type="text"]:focus {
                border-color: #00f5ff;
                box-shadow: 0 0 8px rgba(0, 245, 255, 0.4);
            }

            .staticrypt-form input::placeholder {
                color: #00f5ff66;
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                width: 100%;
                border: 0;
                margin: 0 0 20px;
                box-sizing: border-box;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                opacity: 60%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                filter: invert(1) sepia(1) saturate(5) hue-rotate(160deg);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                outline: 0;
                background: transparent;
                width: 100%;
                border: 1px solid #00f5ff;
                padding: 12px;
                color: #00f5ff;
                font-size: 14px;
                font-family: "Courier New", monospace;
                letter-spacing: 3px;
                cursor: pointer;
                transition: all 0.3s;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: #00f5ff;
                color: #0a0a0f;
                box-shadow: 0 0 15px rgba(0, 245, 255, 0.5);
            }

            .staticrypt-instructions {
                margin-bottom: 1.5em;
            }

            .staticrypt-title {
                font-size: 1.5em;
                color: #00f5ff;
                margin-bottom: 0.5em;
                text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
            }

            .staticrypt-instructions p {
                color: #8892b0;
                font-size: 0.9em;
            }

            .staticrypt-hr {
                margin-top: 15px;
                margin-bottom: 20px;
                border: 0;
                border-top: 1px solid #00f5ff33;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid #00f5ff33;
                border-right-color: #00f5ff;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>

        <script>
            // these variables will be filled when generating the file - the template format is '/*[|variable_name|]*/0'
            const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
            const templateError = "/*[|template_error|]*/0",
                templateToggleAltShow = "/*[|template_toggle_show|]*/0",
                templateToggleAltHide = "/*[|template_toggle_hide|]*/0",
                isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
                staticryptConfig = /*[|staticrypt_config|]*/ 0;

            // you can edit these values to customize some of the behavior of StatiCrypt
            const templateConfig = {
                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",
                replaceHtmlCallback: null,
                clearLocalStorageCallback: null,
            };

            // init the staticrypt engine
            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            // try to automatically decrypt on load if there is a saved password
            window.onload = async function () {
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

                // if we didn't decrypt anything on load, show the password prompt. Otherwise the content has already been
                // replaced, no need to do anything
                if (!isSuccessful) {
                    // hide loading screen
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-password").focus();

                if (passwordInput.type === "password") {
                    passwordInput.type = "text";
                    toggleIcon.src = imgSrcEyeOpened;
                    toggleIcon.alt = templateToggleAltHide;
                    toggleIcon.title = templateToggleAltHide;
                } else {
                    passwordInput.type = "password";
                    toggleIcon.src = imgSrcEyeClosed;
                    toggleIcon.alt = templateToggleAltShow;
                    toggleIcon.title = templateToggleAltShow;

            // handle password form submission - 强制 remember = true，过期 1 小时
            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();

                const password = document.getElementById("staticrypt-password").value;

                // 始终传 true，确保密码被记住，用户无需手动勾选
                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, true);

                if (isSuccessful) {
                    // 覆盖过期时间为 1 小时（staticrypt 默认按天算，这里手动设置精确的过期时间戳）
                    const oneHourFromNow = new Date().getTime() + 1000 * 60 * 60;
                    localStorage.setItem(templateConfig.rememberExpirationKey, oneHourFromNow);
