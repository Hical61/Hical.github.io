name: Deploy Hugo site to Pages

on:
  push:
    branches: ["master"] # 监听咱们的 master 分支
  workflow_dispatch:     # 允许你在网页上手动点按钮触发部署

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4
        with:
          submodules: recursive # 关键：递归拉取 PaperMod 主题
          fetch-depth: 0

      - name: 安装 Hugo (Setup Hugo)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true      # 关键：必须用 extended 版本编译主题

      - name: 编译生成网页 (Build)
        run: hugo --minify    # 加上--buildFuture，则开启代码压缩，构建未来日期文章

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 加密私密文章 (Encrypt private pages)
        env:
          STATICRYPT_PASSWORD: ${{ secrets.PRIVATE_PAGE_PASSWORD }}
        run: |
          npm install -g staticrypt
          if [ -d "public/private" ]; then
            # 使用固定 salt + 自定义模板，输入一次密码全站私密文章免密
            staticrypt public/private -r -p "$STATICRYPT_PASSWORD" --short \
              --remember 1 \
              --salt "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6" \
              -t staticrypt-template.html \
              --template-title "🔒 密室" \
              --template-instructions "请输入密码以访问私密文章" \
              --template-placeholder "输入密码" \
              --template-button "解锁" \
              --template-error "密码错误，请重试"
            # staticrypt -r 不支持 -d 原地覆盖，需手动拷回
            cp -rf encrypted/private/* public/private/
            rm -rf encrypted
            echo "✅ 加密完成"
          else
            echo "⚠️ 没有找到 private 目录，跳过加密"
          fi

      - name: 上传打包文件 (Upload artifact)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages (Deploy)
        id: deploy
        uses: actions/deploy-pages@v4

